<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Translator | Nano Banana 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background-animation"></div>
    
    <main class="glass-container">
        <header>
            <h1>ImagiTranslate</h1>
            <p>Powered by <span>Gemini 3.1 Flash Image</span></p>
        </header>

        <section class="controls-section">
            <div class="input-group">
                <label for="source-lang">Từ:</label>
                <select id="source-lang" class="glass-input">
                    <option value="auto-detect">Tự động phát hiện</option>
                    <option value="English">Tiếng Anh</option>
                    <option value="Italian">Tiếng Ý</option>
                    <option value="Spanish">Tiếng Tây Ban Nha</option>
                    <option value="French">Tiếng Pháp</option>
                    <option value="German">Tiếng Đức</option>
                    <option value="Dutch">Tiếng Hà Lan</option>
                    <option value="Portuguese">Tiếng Bồ Đào Nha</option>
                    <option value="Russian">Tiếng Nga</option>
                    <option value="Arabic">Tiếng Ả Rập</option>
                    <option value="Chinese">Tiếng Trung</option>
                    <option value="Japanese">Tiếng Nhật</option>
                    <option value="Korean">Tiếng Hàn</option>
                    <option value="Vietnamese">Tiếng Việt</option>
                </select>
            </div>
            
            <div class="arrow-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </div>

            <div class="input-group">
                <label for="target-lang">Sang:</label>
                <select id="target-lang" class="glass-input">
                    <option value="Vietnamese">Tiếng Việt</option>
                    <option value="English">Tiếng Anh</option>
                    <option value="Italian">Tiếng Ý</option>
                    <option value="Spanish">Tiếng Tây Ban Nha</option>
                    <option value="French">Tiếng Pháp</option>
                    <option value="German">Tiếng Đức</option>
                    <option value="Dutch">Tiếng Hà Lan</option>
                    <option value="Portuguese">Tiếng Bồ Đào Nha</option>
                    <option value="Russian">Tiếng Nga</option>
                    <option value="Arabic">Tiếng Ả Rập</option>
                    <option value="Chinese">Tiếng Trung</option>
                    <option value="Japanese">Tiếng Nhật</option>
                    <option value="Korean">Tiếng Hàn</option>
                </select>
            </div>

            <div class="input-group">
                <label for="grid-size">Grid:</label>
                <select id="grid-size" class="glass-input">
                    <option value="off">Off</option>
                    <option value="2x2">2×2</option>
                    <option value="3x3">3×3</option>
                    <option value="4x4">4×4</option>
                </select>
            </div>

            <div class="input-group verify-toggle-group">
                <label class="toggle-label">
                    <input type="checkbox" id="verify-toggle">
                    <span>Dịch triệt để (multi-pass)</span>
                </label>
            </div>
        </section>

        <section class="api-section">
            <div class="input-group">
                <label for="api-key">Gemini API Key:</label>
                <input type="password" id="api-key" class="glass-input" placeholder="Nhập API Key của bạn vào đây...">
                <small class="help-text">Khóa API của bạn chỉ được dùng cho lần dịch này và không được lưu lại.</small>
            </div>
        </section>

        <section class="upload-section" id="drop-zone">
            <input type="file" id="file-input" accept="image/png, image/jpeg, image/webp" multiple hidden>
            <div class="upload-content" id="upload-content-default">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <h3>Kéo thả ảnh vào đây</h3>
                <p>hoặc <button id="browse-btn" class="text-btn">chọn file</button> từ thiết bị của bạn</p>
            </div>
            <!-- Preview Gallery per elaborazione in batch -->
            <div id="image-gallery" class="image-gallery" style="display: none;"></div>
        </section>

        <section class="action-section">
            <button id="translate-btn" class="btn-primary" disabled>
                <span class="btn-text">Dịch Ảnh</span>
                <div class="spinner" style="display: none;"></div>
            </button>
        </section>

        <section class="result-section" id="result-container" style="display: none;">
            <h2>Kết Quả Dịch <span id="batch-progress" class="badge highlight"></span></h2>
            <div class="image-comparison" id="results-gallery">
                <!-- Kết quả sẽ được hiển thị tự động ở đây -->
            </div>
            <p style="margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
                Tất cả ảnh đã dịch sẽ xuất hiện ở đây theo thời gian thực.<br>Nhấn "Tải Xuống Ảnh" bên dưới mỗi ảnh để lưu về.
            </p>
        </section>
        
        <div id="error-message" class="toast hidden"></div>
    </main>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
